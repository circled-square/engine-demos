scene:
  # name: collision_demo #does it even make sense to define this instead of just using the filename? for now we just use the filename
  # onload_script: plugins/scripts/lib/scripts:init_collision_demo
  root:
    children:
    - name: imgui_menu
      script: plugins/scripts/lib/scripts:imgui_dbgmenu
    - name: camera
      payload: { type: camera }
      transform: { position: [0,50,250] , look_at: { center: [0,50,0], up: [0,1,0] } } # look_at could have been omitted as that is the direction the camera would have defaulted to anyway
    - name: cone
      load: castlebl.glb
      script: plugins/scripts/lib/scripts:gltf_demo.rotate