
# This is a simple 3d rendered demo showing gltf importing in action

scene:
  # onload_script: plugins/scripts/lib/scripts:init_collision_demo
  root:
    children:
    - name: imgui_menu
      script:
        path: plugins/scripts/lib/scripts
        name: imgui_dbgmenu
    - name: camera
      payload: { type: camera }
      transform: { position: [0,50,250] , look_at: { center: [0,50,0], up: [0,1,0] } } # look_at could have been omitted as that is the direction the camera would have defaulted to anyway
    - name: cone
      load: castlebl.glb
      script:
        path: plugins/scripts/lib/scripts
        name: gltf_demo.rotate