# This demo illustrates collisions and different collision behaviours

scene:
  # name: collision_demo #does it even make sense to define this instead of just using the filename? for now we just use the filename
  # onload_script: plugins/scripts/lib/scripts:init_collision_demo
  root:
    children:
    - name: imgui_menu
      script:
        path: plugins/scripts/lib/scripts
        name: imgui_dbgmenu
    - name: camera
      payload: { type: camera }
      transform: { position: [3,6,6], look_at: { center: [0,0,0], up: [0,1,0] } }
    - name: cone
      load: cone_with_collision.glb
      transform: { position: [2,0,0] }
    - name: kbdcube
      script:
        path: plugins/scripts/lib/scripts
        name: collision_demo.kbdcube
        args: []
      # load: cube_with_collision.glb
      collision_behaviour: { moves_away: true }
      transform: { position: [0,1,0] }
    - name: stillcube
      script:
        path: plugins/scripts/lib/scripts
        name: collision_demo.stillcube
      # load: cube_with_collision.glb